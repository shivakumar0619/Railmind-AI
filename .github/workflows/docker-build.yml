name: Docker Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f docker/backend.Dockerfile -t railmind-backend:${{ github.sha }} .

      - name: Build frontend image
        run: docker build -f docker/frontend.Dockerfile -t railmind-frontend:${{ github.sha }} .
