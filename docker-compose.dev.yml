version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: railmind-postgres-dev
    environment:
      POSTGRES_USER: railmind
      POSTGRES_PASSWORD: railmind
      POSTGRES_DB: railmind
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U railmind -d railmind"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
    name: railmind-postgres-dev-data
